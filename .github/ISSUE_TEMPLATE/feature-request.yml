name: Feature request
description: Suggest a new tool, capability, or improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

        > This is a side project — feature requests are weighed against scope and maintenance cost. The clearer the use case, the more likely it gets picked up.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point. Avoid jumping to a solution.
      placeholder: When I'm debugging slow queries, I need to ... but speedwagon currently doesn't ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the tool or capability look like? How would an agent invoke it?
      placeholder: |
        A new tool `collstats` that returns:
        - document count
        - average document size
        - storage size
        Invoked as: collstats({ collection: "users" })
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or considered, and why they fell short.

  - type: dropdown
    id: package
    attributes:
      label: Which package?
      options:
        - "@scrawl-labs/speedwagon (audit, read-only against production)"
        - "@scrawl-labs/speedwagon-lab (local, write-allowed)"
        - Both
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checklist
      options:
        - label: I have searched existing issues and discussions for similar requests.
          required: true
        - label: This feature stays within the project's scope (MongoDB query analysis / lab workflows).
          required: true
